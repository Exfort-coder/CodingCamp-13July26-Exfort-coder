<!Doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="greeting">
          <div class="greeting__name" id="greetingName">Hello</div>
          <div class="greeting__time" id="greetingTime">--:--</div>
          <div class="greeting__date" id="greetingDate">--</div>
        </div>

        <div class="topbar__actions">
          <label class="field">
            <span class="field__label">Name</span>
            <input
              id="nameInput"
              class="field__input"
              type="text"
              placeholder="Your name"
              maxlength="40"
            />
          </label>

          <button class="btn btn--ghost" id="themeToggle" type="button" aria-label="Toggle dark mode">
            Toggle Theme
          </button>
        </div>
      </header>

      <main class="grid">
        <section class="card card--timer" aria-labelledby="timerTitle">
          <div class="card__header">
            <h2 class="card__title" id="timerTitle">Focus Timer</h2>
            <div class="pill" id="timerStatus">Ready</div>
          </div>

          <div class="timer">
            <div class="timer__time" id="timerDisplay">25:00</div>
            <div class="timer__controls">
              <button class="btn" id="timerStart" type="button">Start</button>
              <button class="btn btn--secondary" id="timerStop" type="button">Stop</button>
              <button class="btn btn--secondary" id="timerReset" type="button">Reset</button>
            </div>

            <div class="timer__settings">
              <label class="field field--inline">
                <span class="field__label">Pomodoro (minutes)</span>
                <input
                  class="field__input"
                  id="pomodoroMinutes"
                  type="number"
                  min="1"
                  max="120"
                  step="1"
                  value="25"
                />
              </label>

              <button class="btn btn--ghost" id="applyPomodoro" type="button">Apply</button>
            </div>
          </div>
        </section>

        <section class="card card--todos" aria-labelledby="todoTitle">
          <div class="card__header">
            <h2 class="card__title" id="todoTitle">To-Do List</h2>
            <div class="todo__meta">
              <span id="todoCount">0 tasks</span>
            </div>
          </div>

          <form class="todo__add" id="todoForm">
            <input
              id="todoInput"
              class="todo__input"
              type="text"
              placeholder="Add a task..."
              maxlength="120"
              autocomplete="off"
              required
            />
            <button class="btn" type="submit">Add</button>
          </form>

          <div class="todo__toolbar">
            <label class="field field--inline">
              <span class="field__label">Sort</span>
              <select id="sortSelect" class="field__input" aria-label="Sort tasks">
                <option value="created_desc">Newest</option>
                <option value="created_asc">Oldest</option>
                <option value="title_asc">Title A→Z</option>
                <option value="title_desc">Title Z→A</option>
                <option value="status_asc">Undone first</option>
                <option value="status_desc">Done first</option>
              </select>
            </label>

            <button class="btn btn--ghost" id="clearDone" type="button">Clear Done</button>
          </div>

          <ul class="todo__list" id="todoList" aria-label="Tasks"></ul>

          <div class="empty" id="todoEmpty">No tasks yet. Add your first one above.</div>
        </section>

        <section class="card card--links" aria-labelledby="linksTitle">
          <div class="card__header">
            <h2 class="card__title" id="linksTitle">Quick Links</h2>
            <div class="pill">Favorites</div>
          </div>

          <form class="links__add" id="linksForm">
            <input
              class="links__input"
              id="linkTitle"
              type="text"
              placeholder="Site name (e.g., Google)"
              maxlength="60"
              required
            />
            <input
              class="links__input"
              id="linkUrl"
              type="url"
              placeholder="https://..."
              maxlength="300"
              required
            />
            <button class="btn" type="submit">Save</button>
          </form>

          <div class="links__list" id="linksList"></div>

          <div class="empty empty--small" id="linksEmpty">No favorites saved yet.</div>

          <div class="links__footer">
            <button class="btn btn--ghost" id="clearLinks" type="button">Clear All Links</button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>Stored locally in your browser • No backend</span>
      </footer>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
